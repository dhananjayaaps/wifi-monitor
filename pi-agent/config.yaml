# Pi Agent Configuration

# Backend API endpoint
api_base_url: "http://localhost:5000/api/v1"

# Network interface to monitor
# - For hotspot/AP mode: Use wlan0 (the WiFi interface broadcasting the hotspot)
# - For regular monitoring: Use the interface you want to monitor
interface: "wlan0"

# Hotspot mode configuration
# When running as WiFi hotspot (Access Point), set this to true
# This optimizes scanning and monitoring for AP mode
hotspot_mode: true
internet_interface: "eth0"  # Interface providing internet (eth0 or usb0 for dongle)

# Authentication credentials
# The agent will login with these credentials to get an API key
auth:
  email: "admin@wifi.com"
  password: "admin123"
  # Optional: set a fixed API key to avoid re-registering after restarts
  api_key: ""

# Simulation mode for POC testing without real hardware
# Set to false for production on Raspberry Pi
simulation_mode: true

# Scan interval in seconds (how often to scan for new devices)
scan_interval: 30

# Stats collection interval in seconds (how often to collect usage stats)
stats_interval: 30

# Logging configuration
log_level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
log_dir: "logs"

# Retry configuration for network operations
retry_attempts: 3
retry_delay: 5  # seconds

# Simulation settings (only used when simulation_mode = true)
simulation:
  # Number of fake devices to generate
  device_count: 5
  # Min/max bytes per interval
  min_bytes: 1024
  max_bytes: 104857600  # 100 MB

# DDoS detector settings
ddos_detector:
  enabled: true
  model_path: "ddos_model.joblib"
  min_confidence: 0.7
  alert_cooldown_seconds: 300

# Audio alert settings (voice notifications through connected speakers)
# Requires espeak installed on Raspberry Pi: sudo apt-get install espeak
audio_alerts:
  enabled: false  # Set to true to enable voice alerts
  engine: "auto"  # auto | espeak | pyttsx3 | gtts
  volume: 80      # Volume level 0-100
  language: "en"  # Language code (en, es, fr, de, etc.)
  cooldown_seconds: 60  # Minimum seconds between alerts of the same type
